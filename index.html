<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まなびランド</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EAF6FF; --card:#FFFFFF; --ink:#1F3A5F; --blue:#3A8DDE; --blue-d:#2E74B8;
  --coral:#FF8A5C; --coral-d:#F0703F; --mint:#34C48E; --sun:#FFC53D; --gray:#9DB2C7;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  background:var(--bg);
  font-family:'Zen Maru Gothic','Hiragino Maru Gothic ProN','BIZ UDPGothic','Yu Gothic',sans-serif;
  color:var(--ink); font-weight:700;
  min-height:100vh; display:flex; justify-content:center;
}
.app{width:100%; max-width:480px; padding:20px 16px 40px;}

/* ---------- hero ---------- */
.hero{text-align:center; margin-bottom:20px;}
.hero .sun{font-size:52px; line-height:1;}
h1{font-size:28px; font-weight:900; margin:6px 0 4px; letter-spacing:2px;}
.hero p{margin:0; font-size:14px; color:var(--blue-d);}

/* ---------- app cards ---------- */
.grid{display:flex; flex-direction:column; gap:14px;}
a.card{
  display:flex; align-items:center; gap:14px; text-decoration:none; color:var(--ink);
  background:var(--card); border-radius:22px; padding:16px 16px;
  box-shadow:0 4px 0 rgba(31,58,95,.12);
  transition:transform .1s;
  border-left:8px solid var(--accent,#3A8DDE);
}
a.card:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(31,58,95,.12);}
.icon{
  flex:0 0 62px; height:62px; border-radius:18px; font-size:34px;
  display:flex; align-items:center; justify-content:center;
  background:var(--accent-bg,#E5F1FC);
}
.info{flex:1; min-width:0;}
.info .subject{display:inline-block; font-size:10px; font-weight:900; color:#fff;
  background:var(--accent,#3A8DDE); border-radius:99px; padding:2px 9px; margin-bottom:3px;}
.info h2{font-size:18px; font-weight:900; margin:0 0 2px; line-height:1.25;}
.info p{font-size:12px; color:var(--gray); margin:0; line-height:1.4;}
.go{flex:0 0 auto; font-size:20px; color:var(--accent,#3A8DDE); font-weight:900;}

/* coming soon */
.card.soon{opacity:.55; pointer-events:none; border-left-color:#C4D3E3;}
.card.soon .icon{background:#EDF3F9;}
.card.soon .subject{background:var(--gray);}
.card.soon .go{visibility:hidden;}

.footer{text-align:center; margin-top:26px; font-size:12px; color:var(--gray);}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="sun">🌈</div>
    <h1>まなびランド</h1>
    <p>やりたいのを えらんでね!</p>
  </div>

  <div class="grid" id="grid"></div>

  <div class="footer">きょうも 1つ がんばろう ⭐</div>
</div>

<script>
/* =====================================================
   ▼▼▼ アプリを ふやすときは この リストに 1こ たすだけ ▼▼▼

   かきかた:
   { emoji:'アイコン', subject:'きょうか', title:'なまえ',
     desc:'せつめい', file:'ファイルめい.html', color:'いろ' },

   color は 'blue' 'coral' 'mint' 'sun' 'purple' から えらべます。
   file を '' (からっぽ) にすると「じゅんびちゅう」カードになります。
   ===================================================== */
const APPS = [
  { emoji:'⏰', subject:'さんすう', title:'とけいで かぞえよう!',
    desc:'はりを うごかして「どれだけ たった?」を マスター', file:'tokei-kazoeyou.html', color:'coral' },

  { emoji:'⚡', subject:'さんすう', title:'あと なんぷんで ちょうど?',
    desc:'ばやおしで「ちょうどまで あといくつ」を きたえる!', file:'hayaoshi.html', color:'purple' },

  { emoji:'❔', subject:'じゅんびちゅう', title:'つぎの アプリ',
    desc:'おたのしみに!', file:'', color:'blue' },
];
/* ===================================================== */

const COLORS = {
  blue:  ['#3A8DDE','#E5F1FC'],
  coral: ['#FF8A5C','#FFEDE4'],
  mint:  ['#34C48E','#E2F7EE'],
  sun:   ['#E8A912','#FFF3D6'],
  purple:['#9B7BE8','#F0EAFC'],
};

const grid = document.getElementById('grid');
APPS.forEach(app=>{
  const [c, cbg] = COLORS[app.color] || COLORS.blue;
  const a = document.createElement('a');
  a.className = 'card' + (app.file ? '' : ' soon');
  a.href = app.file || '#';
  a.style.setProperty('--accent', c);
  a.style.setProperty('--accent-bg', cbg);
  a.innerHTML = `
    <div class="icon">${app.emoji}</div>
    <div class="info">
      <span class="subject">${app.subject}</span>
      <h2>${app.title}</h2>
      <p>${app.desc}</p>
    </div>
    <div class="go">▶</div>`;
  grid.appendChild(a);
});
</script>
</body>
</html>
