<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まなびランド</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
body{font-size:16px; line-height:1.7;}

/* ===== ヘッダー（空グラデーションの上にのる） ===== */
.hero{
  text-align:center;
  padding:44px 20px 20px;
  position:relative; z-index:1;
}
.hero-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:72px;height:72px;border-radius:22px;
  background:linear-gradient(160deg, var(--sun), var(--sun-d));
  box-shadow:var(--shadow-md);
  margin-bottom:16px;
}
.hero h1{
  font-size:28px;
  font-weight:900;
  color:var(--ink);
  letter-spacing:3px;
  line-height:1.2;
  margin-bottom:6px;
}
.hero p{
  font-size:14px;
  font-weight:700;
  color:var(--ink-soft);
}

/* ===== メインコンテンツ ===== */
.content{
  max-width:520px;
  margin:0 auto;
  padding:8px 16px 56px;
  position:relative; z-index:1;
}

/* ===== セクションヘッダー ===== */
.sec-wrap{ margin-bottom:36px; }
.sec-head{
  display:flex;align-items:center;gap:12px;
  margin-bottom:16px;
}
.sec-label{
  font-size:12px;font-weight:900;
  color:var(--on-sun);
  background:linear-gradient(160deg, var(--sun), var(--sun-d));
  border-radius:var(--radius-pill);
  padding:6px 18px;
  white-space:nowrap;
  letter-spacing:.5px;
  box-shadow:var(--shadow-xs);
  flex-shrink:0;
}
.sec-line{flex:1;height:2px;background:var(--card-soft);border-radius:2px;}

/* ===== カードリスト ===== */
.cards{display:flex;flex-direction:column;gap:14px;}

a.card{
  display:flex;align-items:center;gap:16px;
  background:var(--card);
  border-radius:var(--radius-card);
  padding:22px;
  text-decoration:none;
  color:var(--ink);
  box-shadow:var(--shadow-md);
  transition:transform .12s, box-shadow .12s;
}
a.card:active{
  transform:translateY(2px);
  box-shadow:var(--shadow-sm);
}

.card-icon{
  flex:0 0 50px;height:50px;
  border-radius:16px;
  background:var(--card-soft);
  color:var(--blue-d);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.card-icon svg{width:26px;height:26px;}

.card-body{flex:1;min-width:0;}
.card-sub{
  font-size:11px;font-weight:900;
  color:var(--blue-d);
  letter-spacing:.8px;
  margin-bottom:2px;
}
.card-title{
  font-size:17px;font-weight:900;
  line-height:1.3;
  margin:0 0 4px;
}
.card-desc{
  font-size:12.5px;font-weight:400;
  color:var(--ink-soft);
  line-height:1.5;
  margin:0;
}

.card-arrow{
  flex:0 0 32px;height:32px;
  border-radius:50%;
  background:linear-gradient(160deg, var(--sun), var(--sun-d));
  box-shadow:var(--shadow-xs);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.card-arrow svg{width:13px;height:13px;color:var(--on-sun);}

/* coming soon */
a.card.soon{opacity:.5;pointer-events:none;}
a.card.soon .card-arrow{background:var(--card-soft); box-shadow:none;}

.footer{
  text-align:center;
  font-size:13px;font-weight:700;
  color:var(--ink-soft);
  margin-top:16px;
}
</style>
</head>
<body>
<div class="sky-layer" aria-hidden="true">
  <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
</div>

<header class="hero">
  <div class="hero-badge">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none"
         stroke="#7A5200" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="18 3 22 13 33 13 24 20 27 31 18 25 9 31 12 20 3 13 14 13"/>
    </svg>
  </div>
  <h1>まなびランド</h1>
  <p>やりたいのを えらんでね！</p>
</header>

<main class="content" id="root"></main>

<script>
/* ---- SVG アイコン（太めのストローク） ---- */
const ICO = {
  clock:`<svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="14" cy="14" r="11"/>
    <polyline points="14 7 14 14 18 17"/>
  </svg>`,

  bolt:`<svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 2 6 16 14 16 12 26 22 12 14 12"/>
  </svg>`,

  ruler:`<svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="9" width="24" height="10" rx="2.5"/>
    <line x1="7"  y1="9" x2="7"  y2="14"/>
    <line x1="12" y1="9" x2="12" y2="12"/>
    <line x1="17" y1="9" x2="17" y2="14"/>
    <line x1="22" y1="9" x2="22" y2="12"/>
  </svg>`,

  search:`<svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8.5"/>
    <line x1="18.5" y1="18.5" x2="26" y2="26"/>
  </svg>`,

  kanji:`<svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="22" height="22" rx="4"/>
    <line x1="14" y1="6" x2="14" y2="22"/>
    <line x1="6" y1="14" x2="22" y2="14"/>
  </svg>`,

  dots:`<svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
    <circle cx="7"  cy="14" r="2"/>
    <circle cx="14" cy="14" r="2"/>
    <circle cx="21" cy="14" r="2"/>
  </svg>`,

  arrow:`<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="3 2 9 6 3 10"/>
  </svg>`,
};

/* ---- データ ---- */
const CONTENT = [
  {
    key:'math', label:'さんすう',
    apps:[
      { icon:'clock',  sub:'さんすう', title:'とけいで かぞえよう！',
        desc:'はりを うごかして「どれだけ たった?」を マスター', file:'tokei-kazoeyou.html' },
      { icon:'bolt',   sub:'さんすう', title:'あと なんぷんで ちょうど？',
        desc:'はやおしで「ちょうどまで あといくつ」を きたえる！', file:'hayaoshi.html' },
      { icon:'ruler',  sub:'さんすう', title:'ながさの もんだい',
        desc:'mm・cm・m の かんかくを みにつけよう！', file:'nagasa.html' },
    ],
  },
  {
    key:'lang', label:'こくご',
    apps:[
      { icon:'search', sub:'こくご', title:'ことばさがし',
        desc:'かくれた ことばを みつけよう！', file:'kotoba.html' },
      { icon:'kanji',  sub:'こくご', title:'かんじクイズ',
        desc:'よみかた・かんじさがし・なぞりがきで マスター！', file:'kanji.html' },
      { icon:'dots',   sub:'じゅんびちゅう', title:'つぎの アプリ',
        desc:'おたのしみに！', file:'' },
    ],
  },
];

/* ---- レンダリング ---- */
const root = document.getElementById('root');

CONTENT.forEach(sec => {
  const wrap = document.createElement('div');
  wrap.className = 'sec-wrap';

  wrap.innerHTML = `
    <div class="sec-head">
      <span class="sec-label">${sec.label}</span>
      <div class="sec-line"></div>
    </div>
    <div class="cards" id="cards-${sec.key}"></div>
  `;
  root.appendChild(wrap);

  const cardsEl = wrap.querySelector('.cards');
  sec.apps.forEach(app => {
    const a = document.createElement('a');
    a.className = 'card' + (app.file ? '' : ' soon');
    a.href = app.file || '#';
    a.innerHTML = `
      <div class="card-icon">${ICO[app.icon] || ''}</div>
      <div class="card-body">
        <div class="card-sub">${app.sub}</div>
        <h2 class="card-title">${app.title}</h2>
        <p class="card-desc">${app.desc}</p>
      </div>
      <div class="card-arrow">${ICO.arrow}</div>
    `;
    cardsEl.appendChild(a);
  });
});

root.insertAdjacentHTML('beforeend', '<p class="footer">きょうも 1つ がんばろう ✦</p>');
</script>
</body>
</html>
