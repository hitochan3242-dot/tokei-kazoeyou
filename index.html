<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まなびランド</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root{
  --sky:    #5BB3F0;
  --sky-d:  #3A8DDE;
  --sky-l:  #D6EFFF;
  --sky-bg: #F0F8FF;
  --yellow: #FFD43B;
  --yellow-d:#C99A00;
  --white:  #FFFFFF;
  --ink:    #1A3255;
  --ink-s:  #6080A0;
}

html,body{min-height:100%;}
body{
  font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;
  font-size:18px;
  line-height:1.7;
  font-weight:400;
  color:var(--ink);
  background:var(--sky-bg);
}

/* ===== ヒーロー ===== */
.hero{
  background:linear-gradient(175deg, var(--sky) 0%, #8CCEF5 100%);
  text-align:center;
  padding:52px 20px 68px;
  position:relative;
  overflow:hidden;
}
/* 雲（CSS のみ） */
.hero::before,.hero::after{
  content:'';position:absolute;
  background:rgba(255,255,255,.45);
  border-radius:999px;
  pointer-events:none;
}
.hero::before{width:160px;height:48px;top:18%;left:-24px;}
.hero::after {width:110px;height:36px;top:42%;right:-16px;}

.hero-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:72px;height:72px;border-radius:20px;
  background:var(--yellow);
  box-shadow:0 6px 0 var(--yellow-d);
  margin-bottom:18px;
}

.hero h1{
  font-size:32px;
  font-weight:900;
  color:var(--white);
  letter-spacing:4px;
  line-height:1.2;
  margin-bottom:6px;
}
.hero p{
  font-size:15px;
  font-weight:400;
  color:rgba(255,255,255,.88);
}

/* ===== メインコンテンツ ===== */
.content{
  max-width:520px;
  margin:0 auto;
  padding:80px 16px 64px;
}

/* ===== セクションヘッダー ===== */
.sec-wrap{ margin-bottom:40px; }
.sec-wrap + .sec-wrap{ margin-top:0; }
.sec-head{
  display:flex;align-items:center;gap:12px;
  margin-bottom:14px;
}
.sec-line{flex:1;height:1.5px;background:var(--sky-l);border-radius:2px;}
.sec-label{
  font-size:12px;font-weight:700;
  color:var(--sky-d);
  background:var(--sky-l);
  border-radius:99px;
  padding:4px 14px;
  white-space:nowrap;
  letter-spacing:.5px;
}

/* ===== カードリスト ===== */
.cards{display:flex;flex-direction:column;gap:12px;}

a.card{
  display:flex;align-items:center;gap:18px;
  background:var(--white);
  border-radius:20px;          /* card border-radius: 20px */
  padding:28px;                /* card padding: 28px */
  text-decoration:none;
  color:var(--ink);
  box-shadow:0 2px 12px rgba(30,80,160,.07), 0 1px 0 rgba(30,80,160,.04);
  transition:transform .12s, box-shadow .12s;
  position:relative;
  overflow:hidden;
}
a.card:active{
  transform:translateY(3px);
  box-shadow:0 0 4px rgba(30,80,160,.06);
}
/* 左の空色アクセントライン */
a.card::before{
  content:'';position:absolute;
  left:0;top:0;bottom:0;width:4px;
  background:var(--sky);
  border-radius:20px 0 0 20px;
}
a.card.soon::before{background:var(--sky-l);}

.card-icon{
  flex:0 0 48px;height:48px;
  border-radius:14px;
  background:var(--sky-l);
  color:var(--sky-d);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.card-icon svg{width:26px;height:26px;}

.card-body{flex:1;min-width:0;}
.card-sub{
  font-size:11px;font-weight:700;
  color:var(--sky-d);
  letter-spacing:.8px;
  margin-bottom:2px;
}
.card-title{
  font-size:18px;font-weight:700;
  line-height:1.3;
  margin:0 0 4px;
}
.card-desc{
  font-size:13px;font-weight:400;
  color:var(--ink-s);
  line-height:1.5;
  margin:0;
}

.card-arrow{
  flex:0 0 30px;height:30px;
  border-radius:50%;
  background:var(--yellow);
  box-shadow:0 3px 0 var(--yellow-d);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.card-arrow svg{width:12px;height:12px;color:#7A5200;}

/* coming soon */
a.card.soon{opacity:.45;pointer-events:none;}
a.card.soon .card-arrow{background:var(--sky-l);box-shadow:0 3px 0 #B0CDE8;}

.footer{
  text-align:center;
  font-size:13px;font-weight:400;
  color:var(--ink-s);
  margin-top:16px;
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-badge">
    <!-- 星アイコン -->
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none"
         stroke="#7A5200" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="18 3 22 13 33 13 24 20 27 31 18 25 9 31 12 20 3 13 14 13"/>
    </svg>
  </div>
  <h1>まなびランド</h1>
  <p>やりたいのを えらんでね！</p>
</header>

<main class="content" id="root"></main>

<script>
/* ---- SVG アイコン（統一ストロークスタイル） ---- */
const ICO = {
  clock:`<svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="14" cy="14" r="11"/>
    <polyline points="14 7 14 14 18 17"/>
  </svg>`,

  bolt:`<svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 2 6 16 14 16 12 26 22 12 14 12"/>
  </svg>`,

  ruler:`<svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="9" width="24" height="10" rx="2.5"/>
    <line x1="7"  y1="9" x2="7"  y2="14"/>
    <line x1="12" y1="9" x2="12" y2="12"/>
    <line x1="17" y1="9" x2="17" y2="14"/>
    <line x1="22" y1="9" x2="22" y2="12"/>
  </svg>`,

  search:`<svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8.5"/>
    <line x1="18.5" y1="18.5" x2="26" y2="26"/>
  </svg>`,

  dots:`<svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
    <circle cx="7"  cy="14" r="2"/>
    <circle cx="14" cy="14" r="2"/>
    <circle cx="21" cy="14" r="2"/>
  </svg>`,

  arrow:`<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="3 2 9 6 3 10"/>
  </svg>`,
};

/* ---- データ ---- */
const CONTENT = [
  {
    key:'math', label:'さんすう',
    apps:[
      { icon:'clock',  sub:'さんすう', title:'とけいで かぞえよう！',
        desc:'はりを うごかして「どれだけ たった?」を マスター', file:'tokei-kazoeyou.html' },
      { icon:'bolt',   sub:'さんすう', title:'あと なんぷんで ちょうど？',
        desc:'はやおしで「ちょうどまで あといくつ」を きたえる！', file:'hayaoshi.html' },
      { icon:'ruler',  sub:'さんすう', title:'ながさの もんだい',
        desc:'mm・cm・m の かんかくを みにつけよう！', file:'nagasa.html' },
    ],
  },
  {
    key:'lang', label:'こくご',
    apps:[
      { icon:'search', sub:'こくご', title:'ことばさがし',
        desc:'かくれた ことばを みつけよう！', file:'kotoba.html' },
      { icon:'dots',   sub:'じゅんびちゅう', title:'つぎの アプリ',
        desc:'おたのしみに！', file:'' },
    ],
  },
];

/* ---- レンダリング ---- */
const root = document.getElementById('root');

CONTENT.forEach(sec => {
  const wrap = document.createElement('div');
  wrap.className = 'sec-wrap';

  wrap.innerHTML = `
    <div class="sec-head">
      <div class="sec-line"></div>
      <span class="sec-label">${sec.label}</span>
      <div class="sec-line"></div>
    </div>
    <div class="cards" id="cards-${sec.key}"></div>
  `;
  root.appendChild(wrap);

  const cardsEl = wrap.querySelector('.cards');
  sec.apps.forEach(app => {
    const a = document.createElement('a');
    a.className = 'card' + (app.file ? '' : ' soon');
    a.href = app.file || '#';
    a.innerHTML = `
      <div class="card-icon">${ICO[app.icon] || ''}</div>
      <div class="card-body">
        <div class="card-sub">${app.sub}</div>
        <h2 class="card-title">${app.title}</h2>
        <p class="card-desc">${app.desc}</p>
      </div>
      <div class="card-arrow">${ICO.arrow}</div>
    `;
    cardsEl.appendChild(a);
  });
});

root.insertAdjacentHTML('beforeend', '<p class="footer">きょうも 1つ がんばろう ✦</p>');
</script>
</body>
</html>
