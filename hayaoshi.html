<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>あと なんぷんで ちょうど?</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EAF6FF; --card:#FFFFFF; --ink:#1F3A5F; --blue:#3A8DDE; --blue-d:#2E74B8;
  --coral:#FF8A5C; --coral-d:#F0703F; --mint:#34C48E; --sun:#FFC53D; --gray:#9DB2C7; --purple:#9B7BE8;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  font-family:'Zen Maru Gothic','Hiragino Maru Gothic ProN','BIZ UDPGothic','Yu Gothic',sans-serif;
  color:var(--ink); font-weight:700;
  min-height:100vh; display:flex; justify-content:center;
}
.app{width:100%; max-width:480px; padding:12px 12px 30px;}
.top{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:8px;}
.home{text-decoration:none; font-size:20px; background:#fff; border-radius:12px; padding:6px 10px; box-shadow:0 2px 0 rgba(31,58,95,.12);}
h1{font-size:17px; font-weight:900; margin:0; letter-spacing:.5px; flex:1; text-align:center;}
.stars{background:var(--card); border-radius:999px; padding:6px 12px; font-size:16px;
  box-shadow:0 2px 0 rgba(31,58,95,.12); white-space:nowrap; cursor:pointer;}
.stars b{color:var(--coral-d); font-size:18px;}
.stars .hint{font-size:10px; color:var(--gray); margin-left:3px;}
.levels{display:flex; gap:6px; margin-bottom:8px;}
.lv{flex:1; border:none; border-radius:14px; padding:8px 2px; font-family:inherit; font-weight:900;
  font-size:13px; line-height:1.3; background:#fff; color:var(--gray); cursor:pointer;
  box-shadow:0 3px 0 rgba(31,58,95,.10);}
.lv small{display:block; font-size:10px; font-weight:700;}
.lv.on{background:var(--blue); color:#fff; box-shadow:0 3px 0 var(--blue-d);}
.progressrow{display:flex; align-items:center; gap:8px; background:#fff; border-radius:14px;
  padding:7px 12px; margin-bottom:10px; box-shadow:0 2px 0 rgba(31,58,95,.10);}
.pcount{font-size:13px; font-weight:900; white-space:nowrap; color:var(--blue-d);}
.combo{font-size:13px; font-weight:900; color:var(--coral-d); white-space:nowrap; min-width:52px;}
.dots{display:flex; gap:5px; flex:1; justify-content:flex-end;}
.dot{width:18px; height:18px; border-radius:50%; background:#E3EDF7; border:2px solid #C4D3E3;
  display:flex; align-items:center; justify-content:center; font-size:10px; transition:transform .2s;}
.dot.now{border-color:var(--blue); background:#D9EBFC;}
.dot.got3{background:var(--purple); border-color:#7A5BC9; transform:scale(1.12);}
.dot.got2{background:var(--mint); border-color:#26996E; transform:scale(1.12);}
.dot.got1{background:var(--sun); border-color:#D9A324; transform:scale(1.12);}
/* ---------- main card ---------- */
.card{background:var(--card); border-radius:24px; padding:14px 12px; box-shadow:0 4px 0 rgba(31,58,95,.10); text-align:center;}
.nowtime{font-size:30px; font-weight:900; color:var(--blue-d); line-height:1.2;}
.clockwrap{display:flex; justify-content:center; margin:4px 0;}
.clockwrap svg{width:min(56vw,200px); height:auto; display:block;}
.ask{font-size:21px; font-weight:900; margin:2px 0 8px;}
.ask b{color:var(--coral-d); font-size:26px;}
.speedbar{height:10px; background:#E3EDF7; border-radius:99px; overflow:hidden; margin:0 24px;}
.speedbar>div{height:100%; width:100%; background:linear-gradient(90deg,var(--sun),var(--coral)); border-radius:99px;}
.counter{min-height:40px; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:6px;}
.counter .num{font-size:28px; font-weight:900; color:var(--coral-d); transition:transform .15s;}
.counter .num.pop{transform:scale(1.35);}
.counter .lbl{font-size:13px; color:var(--gray);}
.answerBig{font-size:26px; font-weight:900; color:var(--mint);}
/* ---------- choices ---------- */
.choices{display:flex; gap:10px; margin-top:12px;}
.choice{flex:1; border:none; border-radius:18px; padding:18px 4px; font-family:inherit; font-size:22px; font-weight:900;
  background:#fff; color:var(--ink); cursor:pointer; box-shadow:0 4px 0 rgba(31,58,95,.15); transition:transform .08s;}
.choice:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(31,58,95,.15);}
.choice:disabled{opacity:.55;}
.choice.picked{outline:4px solid var(--blue); outline-offset:-2px; opacity:1 !important;}
.choice.right{background:var(--mint); color:#fff; box-shadow:0 4px 0 #26996E; opacity:1 !important;}
.choice.wrong{background:#FFE1E1; color:#D65B5B; opacity:1 !important;}
.actions{display:flex; gap:8px; margin-top:12px;}
.act{flex:1; border:none; border-radius:16px; padding:12px; font-family:inherit; font-size:16px; font-weight:900;
  cursor:pointer; box-shadow:0 3px 0 rgba(31,58,95,.15); background:#fff; color:var(--blue-d);}
.act.primary{background:var(--sun); color:#7A5200; box-shadow:0 3px 0 #D9A324;}
.act.icon{flex:0 0 64px; font-size:20px;}
.act.icon.on{background:var(--blue); color:#fff; box-shadow:0 3px 0 var(--blue-d);}
.spacer{flex:1;}
.msg{text-align:center; min-height:44px; font-size:17px; font-weight:900; margin-top:8px; line-height:1.4;}
.msg.good{color:var(--mint);} .msg.oops{color:var(--coral-d);} .msg.think{color:var(--blue-d);} .msg.fast{color:var(--purple);}
/* ---------- reward / zukan / unlock (shared look) ---------- */
.reward,.zukan,.unlock{position:fixed; inset:0; background:rgba(31,58,95,.45); display:none; justify-content:center; z-index:60; padding:20px;}
.reward,.unlock{align-items:center;}
.zukan{align-items:flex-end; padding:0;}
.rewardcard,.unlockcard{background:#fff; border-radius:28px; padding:26px 22px; text-align:center; max-width:340px; width:100%;
  box-shadow:0 8px 0 rgba(31,58,95,.25); animation:popin .35s;}
@keyframes popin{from{transform:scale(.7); opacity:0;} to{transform:scale(1); opacity:1;}}
.rewardcard .big,.unlockcard .ue{font-size:64px; line-height:1;}
.rewardcard h2{font-size:24px; font-weight:900; margin:10px 0 4px;}
.rewardcard .rstars{font-size:26px; font-weight:900; color:var(--coral-d); margin:8px 0 2px;}
.rewardcard .rtotal{font-size:14px; color:var(--gray); margin-bottom:16px;}
.rewardcard .rmsg{font-size:16px; margin-bottom:18px;}
.rewardcard button,.unlockcard button{width:100%; border:none; border-radius:18px; padding:15px; font-family:inherit;
  font-size:18px; font-weight:900; background:var(--sun); color:#7A5200; box-shadow:0 4px 0 #D9A324; cursor:pointer;}
.unlockcard h3{font-size:20px; font-weight:900; margin:8px 0 2px; color:var(--coral-d);}
.unlockcard .un{font-size:22px; font-weight:900; margin-bottom:16px;}
.zukancard{background:#fff; border-radius:28px 28px 0 0; padding:20px 18px 26px; width:100%; max-width:480px; max-height:82vh; overflow:auto;}
.zukancard h2{font-size:20px; font-weight:900; margin:0 0 4px; text-align:center;}
.znext{text-align:center; font-size:13px; font-weight:900; color:var(--blue-d); margin-bottom:6px;}
.zbar{height:12px; background:#E3EDF7; border-radius:99px; overflow:hidden; margin:0 10px 14px;}
.zbar>div{height:100%; background:linear-gradient(90deg,var(--sun),var(--coral)); border-radius:99px; transition:width .4s;}
.zgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
.badge{background:#F4F9FF; border-radius:18px; padding:12px 6px; text-align:center;}
.badge .be{font-size:34px; line-height:1.1;}
.badge .bn{font-size:12px; font-weight:900; margin-top:4px;}
.badge .bt{font-size:11px; color:var(--gray);}
.badge.locked .be{filter:grayscale(1); opacity:.45;}
.badge.locked .bn{color:var(--gray);}
.zclose{width:100%; margin-top:14px; border:none; border-radius:16px; padding:13px; font-family:inherit;
  font-size:16px; font-weight:900; background:var(--blue); color:#fff; box-shadow:0 3px 0 var(--blue-d); cursor:pointer;}
@media (prefers-reduced-motion: reduce){ .rewardcard,.unlockcard{animation:none;} }
.confetti{position:fixed; top:-12px; width:10px; height:14px; border-radius:3px; pointer-events:none; z-index:70;
  animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}
@media (prefers-reduced-motion: reduce){ .confetti{display:none;} }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a class="home" href="index.html" title="もくじへ">🏠</a>
    <h1>⚡あと なんぷんで ちょうど?</h1>
    <div class="stars" id="starsPill">⭐<b id="stars">0</b><span class="hint">📖</span></div>
  </div>

  <div class="levels">
    <button class="lv on" data-lv="1">レベル1<small>10ぷん きざみ</small></button>
    <button class="lv" data-lv="2">レベル2<small>5ふん きざみ</small></button>
    <button class="lv" data-lv="3">レベル3<small>1ぷん きざみ</small></button>
  </div>

  <div class="progressrow">
    <div class="pcount" id="pcount">もんだい 1/10</div>
    <div class="combo" id="combo"></div>
    <div class="dots" id="dots"></div>
  </div>

  <div class="card">
    <div class="nowtime" id="nowTime">7じ40ぷん</div>
    <div class="clockwrap"><div id="clock"></div></div>
    <div class="ask">あと なんぷんで <b id="nextHour">8じ</b> ?</div>
    <div class="speedbar"><div id="speedFill"></div></div>
    <div class="counter" id="counter"></div>
  </div>

  <div class="choices" id="choices"></div>
  <div class="msg think" id="msg"></div>

  <div class="actions">
    <button class="act icon" id="soundBtn" title="おと">🔊</button>
    <div class="spacer"></div>
    <button class="act primary" id="nextBtn" style="display:none">つぎ ➡</button>
  </div>
</div>

<div class="reward" id="reward">
  <div class="rewardcard">
    <div class="big" id="rEmoji">🏆</div>
    <h2 id="rTitle">クリア!</h2>
    <div class="rstars" id="rStars"></div>
    <div class="rtotal" id="rTotal"></div>
    <div class="rmsg" id="rMsg"></div>
    <button id="againBtn">もういちど あそぶ ▶</button>
  </div>
</div>

<div class="zukan" id="zukan">
  <div class="zukancard">
    <h2>🏅 バッジずかん</h2>
    <div class="znext" id="znext"></div>
    <div class="zbar"><div id="zbarFill" style="width:0%"></div></div>
    <div class="zgrid" id="zgrid"></div>
    <button class="zclose" id="zClose">とじる</button>
  </div>
</div>

<div class="unlock" id="unlock">
  <div class="unlockcard">
    <div class="ue" id="uEmoji">🏅</div>
    <h3>バッジ ゲット!</h3>
    <div class="un" id="uName"></div>
    <button id="uClose">やったー!</button>
  </div>
</div>

<script>
(() => {
const CX=150, CY=150, QUESTIONS=10, FAST_MS=4000;
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
const dur = ms => reduce ? ms*0.15 : ms;

/* ---------- sound ---------- */
let actx=null, muted=false;
function audio(){
  if(muted) return null;
  if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
  if(actx.state==='suspended') actx.resume();
  return actx;
}
function tone(freq,t0,len,type='sine',vol=0.18){
  const ac=audio(); if(!ac)return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.value=freq;
  const s=ac.currentTime+t0;
  g.gain.setValueAtTime(0.0001,s);
  g.gain.exponentialRampToValueAtTime(vol,s+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,s+len);
  o.connect(g); g.connect(ac.destination);
  o.start(s); o.stop(s+len+0.05);
}
const sTick   = k => tone(520*Math.pow(2,Math.min(k,14)/14),0,.14,'triangle',.2);
const sRight  = () => { tone(784,0,.15,'sine',.25); tone(1175,.14,.35,'sine',.25); };
const sFastB  = () => { tone(880,0,.1,'square',.12); tone(1320,.1,.12,'square',.12); tone(1760,.2,.2,'square',.12); };
const sOops   = () => { tone(330,0,.2,'sine',.14); tone(294,.18,.3,'sine',.12); };
const sPick   = () => tone(600,0,.08,'triangle',.12);
const sFanfare= () => { [523,659,784,1047].forEach((f,i)=>tone(f,i*.14,.32,'sine',.22)); tone(1319,.6,.5,'sine',.22); };

/* ---------- helpers ---------- */
const rad=a=>a*Math.PI/180;
const pt=(a,r)=>[CX+r*Math.sin(rad(a)),CY-r*Math.cos(rad(a))];
const fun=m=>{const d=m%10; return [2,5,7,9].includes(d)?'ふん':'ぷん';};
const fmtTime=(h,m)=> m===0?`${h}じ`:`${h}じ${m}${fun(m)}`;
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const range=(a,b,s=1)=>{const o=[];for(let i=a;i<=b;i+=s)o.push(i);return o;};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function tween(ms,fn){return new Promise(res=>{
  const t0=performance.now();
  (function step(t){const p=Math.min(1,(t-t0)/ms); fn(p); p<1?requestAnimationFrame(step):res();})(t0);
});}

/* ---------- clock ---------- */
const NS='http://www.w3.org/2000/svg';
const el=(n,at)=>{const e=document.createElementNS(NS,n);for(const k in at)e.setAttribute(k,at[k]);return e;};
const svg=el('svg',{viewBox:'0 0 300 300'});
svg.appendChild(el('circle',{cx:CX,cy:CY,r:120,fill:'#FFFDF7',stroke:'#3A8DDE','stroke-width':7}));
const arc=el('path',{fill:'rgba(52,196,142,.30)',d:''}); svg.appendChild(arc);
for(let i=0;i<60;i++){
  const a=i*6,big=i%5===0;
  const [x1,y1]=pt(a,big?104:110),[x2,y2]=pt(a,116);
  svg.appendChild(el('line',{x1,y1,x2,y2,stroke:big?'#1F3A5F':'#C4D3E3','stroke-width':big?4:2,'stroke-linecap':'round'}));
}
for(let n=1;n<=12;n++){
  const [x,y]=pt(n*30,88);
  const t=el('text',{x,y:y+8,'text-anchor':'middle','font-size':24,'font-weight':900,fill:'#1F3A5F','font-family':'inherit'});
  t.textContent=n; svg.appendChild(t);
}
for(let n=1;n<=12;n++){
  const [x,y]=pt(n*30,137);
  const t=el('text',{x,y:y+4,'text-anchor':'middle','font-size':12,'font-weight':700,fill:'#9DB2C7','font-family':'inherit'});
  t.textContent=n*5; svg.appendChild(t);
}
const hHour=el('line',{x1:CX,y1:CY,x2:CX,y2:CY-55,stroke:'#1F3A5F','stroke-width':11,'stroke-linecap':'round'});
const hMin =el('line',{x1:CX,y1:CY,x2:CX,y2:CY-92,stroke:'#FF8A5C','stroke-width':8,'stroke-linecap':'round'});
svg.appendChild(hHour); svg.appendChild(hMin);
svg.appendChild(el('circle',{cx:CX,cy:CY,r:8,fill:'#1F3A5F'}));
const bubbles=el('g',{}); svg.appendChild(bubbles);
document.getElementById('clock').appendChild(svg);

function setHands(hA,mA){
  hHour.setAttribute('transform',`rotate(${hA} ${CX} ${CY})`);
  hMin.setAttribute('transform',`rotate(${mA} ${CX} ${CY})`);
}
function drawArc(a0,sweep){
  if(sweep<=0){arc.setAttribute('d','');return;}
  if(sweep>=360){arc.setAttribute('d',`M${CX-104},${CY} a104,104 0 1,0 208,0 a104,104 0 1,0 -208,0`);return;}
  const [x1,y1]=pt(a0,104),[x2,y2]=pt(a0+sweep,104);
  arc.setAttribute('d',`M${CX},${CY} L${x1},${y1} A104,104 0 ${sweep>180?1:0},1 ${x2},${y2} Z`);
}
function popBubble(minute,label){
  const [x,y]=pt((minute%60)*6,137);
  const g=el('g',{opacity:0});
  g.appendChild(el('circle',{cx:x,cy:y,r:15,fill:'#34C48E'}));
  const t=el('text',{x,y:y+4.5,'text-anchor':'middle','font-size':12,'font-weight':900,fill:'#fff','font-family':'inherit'});
  t.textContent=label; g.appendChild(t);
  bubbles.appendChild(g);
  tween(dur(150),p=>g.setAttribute('opacity',p));
}

/* ---------- badges & save ---------- */
const BADGES=[
  {n:10,  e:'🐣', name:'ちょうどの ひよこ'},
  {n:25,  e:'⚡', name:'いなずま キッズ'},
  {n:50,  e:'🥉', name:'どうメダル'},
  {n:80,  e:'🥈', name:'ぎんメダル'},
  {n:120, e:'🥇', name:'きんメダル'},
  {n:170, e:'💎', name:'ダイヤの ⚡'},
  {n:230, e:'🚄', name:'しんかんせん きゅう'},
  {n:300, e:'✈️', name:'ジェットき きゅう'},
  {n:400, e:'🚀', name:'ロケット きゅう'},
  {n:500, e:'🏆', name:'ちょうど マスター'},
];
let stars=0;
const unlockedCount=s=>BADGES.filter(b=>s>=b.n).length;
async function saveStars(){ try{ if(window.storage) await window.storage.set('hayaoshi-stars',String(stars)); }catch(e){} }
async function loadStars(){
  try{ if(window.storage){ const r=await window.storage.get('hayaoshi-stars'); if(r&&r.value) stars=parseInt(r.value)||0; } }catch(e){}
  $('stars').textContent=stars;
}

/* ---------- state ---------- */
let level=1, prob=null, busy=false, answered=false;
let qNum=0, sessionStars=0, combo=0, t0=0, barTimer=null;
const $=id=>document.getElementById(id);

/* ---------- session ---------- */
function buildDots(){
  const box=$('dots'); box.replaceChildren();
  for(let i=0;i<QUESTIONS;i++){ const d=document.createElement('div'); d.className='dot'; box.appendChild(d); }
}
function startSession(){
  qNum=0; sessionStars=0; combo=0;
  buildDots(); updateCombo();
  $('reward').style.display='none';
  nextQuestion();
}
function nextQuestion(){
  qNum++;
  $('pcount').textContent=`もんだい ${qNum}/${QUESTIONS}`;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('now',i===qNum-1));
  showProblem();
}
function markDot(gain){
  const d=document.querySelectorAll('.dot')[qNum-1]; if(!d)return;
  d.classList.remove('now');
  d.classList.add(gain>=3?'got3':gain>=2?'got2':'got1');
  d.textContent=gain>=3?'⚡':'⭐';
}
function updateCombo(){
  $('combo').textContent = combo>=2 ? `🔥×${combo}` : '';
}
function showReward(){
  const max=QUESTIONS*3;
  let emoji,title,msg;
  if(sessionStars>=max*0.86){ emoji='🏆'; title='いなずま クリア!'; msg='はやくて せいかく!かっこいい!⚡'; }
  else if(sessionStars>=max*0.6){ emoji='🌟'; title='すごい!クリア!'; msg='ちょうどの かんかくが みについてきた!'; }
  else { emoji='💪'; title='さいごまで がんばった!'; msg='なんども やると どんどん はやくなるよ!'; }
  $('rEmoji').textContent=emoji; $('rTitle').textContent=title;
  $('rStars').textContent=`⭐×${sessionStars} ゲット!`;
  $('rTotal').textContent=`ぜんぶで ⭐${stars}こ`;
  $('rMsg').textContent=msg;
  $('reward').style.display='flex';
  sFanfare(); confetti(60);
}

/* ---------- zukan / unlock ---------- */
function renderZukan(){
  const grid=$('zgrid'); grid.replaceChildren();
  BADGES.forEach(b=>{
    const got=stars>=b.n;
    const d=document.createElement('div');
    d.className='badge'+(got?'':' locked');
    d.innerHTML=`<div class="be">${got?b.e:'❔'}</div><div class="bn">${got?b.name:'? ? ?'}</div><div class="bt">⭐${b.n}</div>`;
    grid.appendChild(d);
  });
  const next=BADGES.find(b=>stars<b.n);
  if(next){
    const prev=[...BADGES].reverse().find(b=>stars>=b.n);
    const base=prev?prev.n:0;
    $('znext').textContent=`つぎのバッジまで あと⭐${next.n-stars}こ!`;
    $('zbarFill').style.width=Math.min(100,(stars-base)/(next.n-base)*100)+'%';
  }else{
    $('znext').textContent='ぜんぶ あつめた!🎉';
    $('zbarFill').style.width='100%';
  }
}
function showUnlock(b){
  $('uEmoji').textContent=b.e; $('uName').textContent=b.name;
  $('unlock').style.display='flex';
  sFanfare(); confetti(40);
}
function gainStars(gain){
  const before=unlockedCount(stars);
  stars+=gain; sessionStars+=gain;
  $('stars').textContent=stars;
  saveStars();
  if(unlockedCount(stars)>before){
    const b=BADGES[unlockedCount(stars)-1];
    setTimeout(()=>showUnlock(b),900);
  }
}

/* ---------- problem ---------- */
function makeProblem(){
  const h=rnd(range(1,12));
  let m;
  if(level===1) m=rnd([10,20,30,40,50]);
  else if(level===2) m=rnd(range(5,55,5));
  else m=rnd(range(1,59));
  return {h, m, h2:h%12+1, ans:60-m};
}
function makeChoices(c,m){
  const pool=[c-10,c+10,c-5,c+5,m];
  const set=new Set([c]);
  for(const t of pool){ if(set.size>=3)break; if(t>=1&&t<=59&&!set.has(t)) set.add(t); }
  let extra=c+15;
  while(set.size<3){ if(extra>=1&&extra<=59&&!set.has(extra)) set.add(extra); extra-=30; }
  return [...set].sort(()=>Math.random()-.5);
}

/* ---------- rendering ---------- */
function showProblem(){
  prob=makeProblem(); answered=false;
  bubbles.replaceChildren(); drawArc(0,0);
  setHands((prob.h%12)*30+prob.m*0.5, prob.m*6);
  $('nowTime').textContent=fmtTime(prob.h,prob.m);
  $('nextHour').textContent=`${prob.h2}じ`;
  $('counter').innerHTML='<span class="lbl">ながい はりが 12まで あといくつ?</span>';
  $('msg').textContent=''; $('msg').className='msg think';
  $('nextBtn').style.display='none';
  const box=$('choices'); box.replaceChildren();
  makeChoices(prob.ans,prob.m).forEach(v=>{
    const b=document.createElement('button');
    b.className='choice'; b.textContent=v+fun(v); b.dataset.val=v;
    b.onclick=()=>pick(b,v);
    box.appendChild(b);
  });
  // speed bar
  clearInterval(barTimer);
  t0=Date.now();
  const fill=$('speedFill');
  fill.style.width='100%';
  barTimer=setInterval(()=>{
    const left=Math.max(0,1-(Date.now()-t0)/FAST_MS);
    fill.style.width=(left*100)+'%';
    if(left<=0) clearInterval(barTimer);
  },80);
}

function setCounter(html){$('counter').innerHTML=html;}
function popCounter(txt,lbl){
  setCounter(`<span class="num pop">${txt}</span><span class="lbl">${lbl||''}</span>`);
  setTimeout(()=>{const n=$('counter').querySelector('.num'); if(n)n.classList.remove('pop');},dur(150));
}

/* ---------- explanation: count up to the hour ---------- */
async function playCount(){
  busy=true;
  bubbles.replaceChildren(); drawArc(0,0);
  const {m}=prob;
  const startA=m*6;
  // steps: 1-minute steps up to next multiple of 5, then 5-minute steps to 60
  const steps=[];
  let cur=m;
  while(cur%5!==0){ cur++; steps.push({to:cur, by:1}); }
  while(cur<60){ cur+=5; steps.push({to:cur, by:5}); }
  let mA=startA, k=0, count=0, cm=m;
  for(const st of steps){
    k++;
    count+=st.by;
    const a0=mA, target=st.to*6, cm0=cm;
    await tween(dur(st.by===1?200:340),p=>{
      const e=1-Math.pow(1-p,3);
      const curM=cm0+(st.to-cm0)*e;
      setHands((prob.h%12)*30+curM*0.5, a0+(target-a0)*e);
      drawArc(startA, a0+(target-a0)*e-startA);
    });
    mA=target; cm=st.to;
    sTick(k);
    popBubble(st.to, count);
    popCounter(count+fun(count),'');
    await sleep(dur(st.by===1?160:280));
  }
  setCounter(`<span class="answerBig">こたえ: ${prob.ans}${fun(prob.ans)}</span>`);
  busy=false;
}

/* ---------- answering ---------- */
async function pick(btn,val){
  if(busy||answered)return;
  answered=true;
  clearInterval(barTimer);
  const dt=Date.now()-t0;
  audio(); sPick();
  btn.classList.add('picked');
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);

  const buttons=[...document.querySelectorAll('.choice')];
  const correctBtn=buttons.find(b=>+b.dataset.val===prob.ans);

  let gain;
  if(val===prob.ans){
    combo++;
    correctBtn.classList.add('right');
    const fast = dt<=FAST_MS;
    gain = fast?3:2;
    if(fast){ sFastB(); $('msg').textContent=`⚡はやい! せいかい! ⭐+3 ${combo>=2?`🔥×${combo}`:''}`; $('msg').className='msg fast'; }
    else{ sRight(); $('msg').textContent=`せいかい! ⭐+2 ${combo>=2?`🔥×${combo}`:''}`; $('msg').className='msg good'; }
    updateCombo();
    confetti(fast?34:22);
    // quick visual confirm: fill the remaining arc instantly-ish
    await tween(dur(400),p=>drawArc(prob.m*6, (360-prob.m*6)*p));
    popBubble(60, prob.ans);
  }else{
    combo=0; updateCombo();
    btn.classList.add('wrong');
    sOops();
    $('msg').textContent='おしい! いっしょに かぞえよう👇';
    $('msg').className='msg oops';
    await sleep(dur(500));
    await playCount();
    correctBtn.classList.add('right');
    gain=1;
    $('msg').textContent=`こたえは「${prob.ans}${fun(prob.ans)}」! かぞえられたから ⭐+1`;
    $('msg').className='msg oops';
  }
  gainStars(gain);
  markDot(gain);
  if(combo===5){ $('msg').textContent+=' 🎉5れんぞく!'; confetti(40); }
  $('nextBtn').textContent = qNum>=QUESTIONS ? '🎉 けっかを みる!' : 'つぎ ➡';
  $('nextBtn').style.display='';
}

/* ---------- confetti ---------- */
function confetti(n){
  const colors=['#FF8A5C','#3A8DDE','#FFC53D','#34C48E','#9B7BE8'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=rnd(colors);
    c.style.animationDuration=(1.4+Math.random()*1.2)+'s';
    c.style.animationDelay=(Math.random()*.4)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3400);
  }
}

/* ---------- wiring ---------- */
document.querySelectorAll('.lv').forEach(b=>b.onclick=()=>{
  if(busy)return;
  document.querySelectorAll('.lv').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); level=+b.dataset.lv;
  startSession();
});
$('nextBtn').onclick=()=>{
  if(busy)return;
  if(qNum>=QUESTIONS){ showReward(); } else { nextQuestion(); }
};
$('againBtn').onclick=startSession;
$('soundBtn').onclick=()=>{
  muted=!muted;
  $('soundBtn').textContent=muted?'🔇':'🔊';
  $('soundBtn').classList.toggle('on',muted);
  if(!muted){ audio(); sPick(); }
};
$('starsPill').onclick=()=>{ renderZukan(); $('zukan').style.display='flex'; };
$('zClose').onclick=()=>$('zukan').style.display='none';
$('zukan').onclick=e=>{ if(e.target.id==='zukan') $('zukan').style.display='none'; };
$('uClose').onclick=()=>$('unlock').style.display='none';

loadStars().finally(startSession);
})();
</script>
