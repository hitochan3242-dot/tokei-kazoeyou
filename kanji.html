<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>かんじクイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
.miss{font-size:12.5px; font-weight:900; color:var(--on-coral); white-space:nowrap; min-width:60px; text-align:right;}

.view{display:none;}
.view.on{display:block;}

/* ---------- よみかたクイズ（このページ固有） ---------- */
.wordcard{background:var(--card); border-radius:var(--radius-card); padding:34px 14px; text-align:center;
  box-shadow:var(--shadow-md); margin-bottom:12px;}
.wordcard .kj{font-size:clamp(40px,13vw,60px); font-weight:900; letter-spacing:.04em; color:var(--ink); line-height:1.2;}
.anslist{display:flex; flex-direction:column; gap:10px;}
.ansbtn.correct{background:linear-gradient(160deg, var(--mint), var(--mint-d)); color:#fff;}
.ansbtn.wrong{background:#FFE2DA; color:var(--on-coral);}

/* ---------- なぞりがき（このページ固有） ---------- */
.trace-wrap{background:var(--card); border-radius:var(--radius-card); padding:18px; box-shadow:var(--shadow-md);
  display:flex; flex-direction:column; align-items:center;}
#hwTarget{width:min(70vw,260px); height:min(70vw,260px); background:var(--card-soft); border-radius:20px; overflow:hidden;}
.trace-controls{display:flex; gap:8px; margin-top:14px; width:100%;}
</style>
</head>
<body>
<div class="sky-layer" aria-hidden="true"><div class="cloud c1"></div><div class="cloud c2"></div><div class="deco-star s1">&#10022;</div><div class="deco-heart h1">&#9825;</div></div>
<div class="app">
  <div class="top">
    <a href="index.html" class="home" title="もくじへ">🏠</a>
    <h1>🈴 かんじクイズ</h1>
    <div class="stars" id="starsPill">⭐<b id="stars">0</b><span class="hint">📖</span></div>
  </div>

  <div class="levels" id="grades">
    <button class="lv on" data-g="1">1年生<small>やさしい</small></button>
    <button class="lv" data-g="2">2年生<small>ちょっと むずかしい</small></button>
  </div>

  <div class="tabs" id="modes">
    <button class="tab on" data-m="read">📖 よみかた</button>
    <button class="tab" data-m="search">🔍 かんじさがし</button>
    <button class="tab" data-m="trace">✍️ なぞりがき</button>
  </div>

  <div class="progressrow">
    <div class="pcount" id="pcount">1/8</div>
    <div class="dots" id="dots"></div>
    <div class="miss" id="missCount"></div>
  </div>

  <!-- ===== よみかたクイズ ===== -->
  <div class="view on" id="viewRead">
    <div class="wordcard"><div class="kj" id="rWord">一</div></div>
    <div class="anslist" id="rAns"></div>
    <div class="msg think" id="rMsg">ただしい よみかたを えらんでね!</div>
  </div>

  <!-- ===== かんじさがし ===== -->
  <div class="view" id="viewSearch">
    <div class="grid-wrap">
      <div class="word-grid" id="wordGrid"></div>
    </div>
    <div class="wordlist" id="wordList"></div>
    <div class="msg think" id="sMsg">じゅくごを さがして ドラッグしてね!</div>
    <div class="actions">
      <button class="act icon" id="soundBtn" title="おと">🔊</button>
      <div class="spacer"></div>
      <button class="act primary" id="nextBtn" style="display:none">つぎの パズル ➡</button>
    </div>
  </div>

  <!-- ===== なぞりがき ===== -->
  <div class="view" id="viewTrace">
    <div class="trace-wrap">
      <div id="hwTarget"></div>
      <div class="trace-controls">
        <button class="act" id="demoBtn">👀 おてほん</button>
        <button class="act primary" id="skipBtn">つぎへ ➡</button>
      </div>
    </div>
    <div class="msg think" id="tMsg">ゆびで なぞって かいてみよう!</div>
  </div>
</div>

<div class="reward" id="reward" style="display:none">
  <div class="rewardcard">
    <div class="big" id="rEmoji">🏆</div>
    <h2 id="rTitle">クリア!</h2>
    <div class="rstars" id="rStars"></div>
    <div class="rtotal" id="rTotal"></div>
    <div class="rmsg" id="rMsgFinal"></div>
    <button id="againBtn">もういちど あそぶ ▶</button>
  </div>
</div>

<div class="zukan" id="zukan" style="display:none">
  <div class="zukancard">
    <h2>🏅 バッジずかん</h2>
    <div class="znext" id="znext"></div>
    <div class="zbar"><div id="zbarFill" style="width:0%"></div></div>
    <div class="zgrid" id="zgrid"></div>
    <button class="zclose" id="zClose">とじる</button>
  </div>
</div>

<div class="unlock" id="unlock" style="display:none">
  <div class="unlockcard">
    <div class="ue" id="uEmoji">🏅</div>
    <h3>バッジ ゲット!</h3>
    <div class="un" id="uName"></div>
    <button id="uClose">やったー!</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script>
(() => {
const $=id=>document.getElementById(id);

/* ================= かんじデータ ================= */
const GRADE1_CHARS = "一右雨円王音下火花貝学気九休玉金空月犬見五口校左三山子四糸字耳七車手十出女小上森人水正生青夕石赤千川先早草足村大男竹中虫町天田土二日入年白八百文木本名目立力林六".split('');

    ['山','やま'],['川','かわ'],['木','き'],['森','もり'],['玉','たま'],['車','くるま'],['糸','いと'],['石','いし'],

/* ---------- sound ---------- */
let actx=null, muted=false;
function audio(){
  if(muted)return null;
  if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  if(actx.state==='suspended')actx.resume();
  return actx;
}
function tone(freq,t0,len,type='sine',vol=0.18){
  const ac=audio();if(!ac)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type;o.frequency.value=freq;
  const s=ac.currentTime+t0;
  g.gain.setValueAtTime(0.0001,s);g.gain.exponentialRampToValueAtTime(vol,s+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,s+len);
  o.connect(g);g.connect(ac.destination);o.start(s);o.stop(s+len+0.05);
}
const sRight  =()=>{tone(784,0,.15,'sine',.25);tone(1175,.14,.35,'sine',.25);};
const sOops   =()=>{tone(330,0,.18,'sine',.13);};
const sFanfare=()=>{[523,659,784,1047].forEach((f,i)=>tone(f,i*.14,.32,'sine',.22));tone(1319,.6,.5,'sine',.22);};
const sFound  =()=>{tone(880,0,.12,'sine',.2);tone(1320,.1,.2,'sine',.18);};

/* ---------- helpers ---------- */
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

/* ---------- state ---------- */
let grade=1, mode='read', stars=0, sessionStars=0;

/* ---------- badges ---------- */
const BADGES=[
  {n:10, e:'🈴',name:'かんじの たまご'},
  {n:25, e:'📝',name:'かんじ キッズ'},
  {n:50, e:'🥉',name:'どうメダル'},
  {n:80, e:'🥈',name:'ぎんメダル'},
  {n:120,e:'🥇',name:'きんメダル'},
  {n:180,e:'💎',name:'ダイヤの ふでばこ'},
  {n:250,e:'🦉',name:'かんじの ふくろう'},
  {n:350,e:'✍️',name:'しょどう きゅう'},
  {n:450,e:'📚',name:'かんじ はかせ'},
  {n:600,e:'🏆',name:'かんじ マスター'},
];
const unlockedCount=s=>BADGES.filter(b=>s>=b.n).length;
async function saveStars(){try{if(window.storage)await window.storage.set('kanji-stars',String(stars));}catch(e){}}
async function loadStars(){
  try{if(window.storage){const r=await window.storage.get('kanji-stars');if(r&&r.value)stars=parseInt(r.value)||0;}}catch(e){}
  $('stars').textContent=stars;
}
function renderZukan(){
  const g=$('zgrid');g.replaceChildren();
  BADGES.forEach(b=>{
    const got=stars>=b.n,d=document.createElement('div');
    d.className='badge'+(got?'':' locked');
    d.innerHTML=`<div class="be">${got?b.e:'❔'}</div><div class="bn">${got?b.name:'? ? ?'}</div><div class="bt">⭐${b.n}</div>`;
    g.appendChild(d);
  });
  const next=BADGES.find(b=>stars<b.n);
  if(next){
    const prev=[...BADGES].reverse().find(b=>stars>=b.n);
    const base=prev?prev.n:0;
    $('znext').textContent=`つぎのバッジまで あと⭐${next.n-stars}こ!`;
    $('zbarFill').style.width=Math.min(100,(stars-base)/(next.n-base)*100)+'%';
  }else{$('znext').textContent='ぜんぶ あつめた!🎉';$('zbarFill').style.width='100%';}
}
function showUnlock(b){$('uEmoji').textContent=b.e;$('uName').textContent=b.name;$('unlock').style.display='flex';sFanfare();confetti(40);}
function gainStars(gain){
  const before=unlockedCount(stars);
  stars+=gain;sessionStars+=gain;$('stars').textContent=stars;saveStars();
  if(unlockedCount(stars)>before){const b=BADGES[unlockedCount(stars)-1];setTimeout(()=>showUnlock(b),900);}
}

/* ---------- confetti ---------- */
function confetti(n){
  const colors=['#FFB49B','#8FC5F5','#FFDE8E','#9CE3C9','#CBB9F2'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'vw';c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(1.4+Math.random()*1.2)+'s';c.style.animationDelay=(Math.random()*.4)+'s';
    document.body.appendChild(c);setTimeout(()=>c.remove(),3400);
  }
}

/* ---------- shared progress dots ---------- */
function buildDots(n){
  const box=$('dots');box.replaceChildren();
  for(let i=0;i<n;i++){const d=document.createElement('div');d.className='dot';box.appendChild(d);}
}
function markDot(idx,gain){
  const d=document.querySelectorAll('.dot')[idx];if(!d)return;
  d.classList.remove('now');
  d.classList.add(gain>=3?'got3':gain>=2?'got2':'got1');
  d.textContent='⭐';
}
function setNowDot(idx){document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('now',i===idx));}

function showReward(title,msgGood){
  const max=(mode==='search')?5*3:8*3;
  let emoji,msg;
  if(sessionStars>=max*0.9){emoji='🏆';msg=msgGood;}
  else if(sessionStars>=max*0.6){emoji='🌟';msg='かんじ、うまいね!';}
  else{emoji='💪';msg='なんどもやると もっと おぼえられるよ!';}
  $('rEmoji').textContent=emoji;$('rTitle').textContent=title;
  $('rStars').textContent=`⭐×${sessionStars} ゲット!`;$('rTotal').textContent=`ぜんぶで ⭐${stars}こ`;
  $('rMsgFinal').textContent=msg;$('reward').style.display='flex';sFanfare();confetti(60);
}

/* ================= よみかたクイズ ================= */
const READ_LEN=8;
let rQueue=[],rIdx=0,rLocked=false;

function startRead(){
  const pool=shuffle(READING_WORDS[grade]);
  rQueue=pool.slice(0,READ_LEN);
  rIdx=0;sessionStars=0;
  buildDots(READ_LEN);
  $('reward').style.display='none';
  nextRead();
}
function nextRead(){
  if(rIdx>=rQueue.length){showReward('よみかた クリア!','ぜんぶ ただしく よめたね! さすが!');return;}
  $('pcount').textContent=`${rIdx+1}/${READ_LEN}`;
  setNowDot(rIdx);
  rLocked=false;
  const [word,reading]=rQueue[rIdx];
  $('rWord').textContent=word;
  $('rMsg').textContent='ただしい よみかたを えらんでね!';
  $('rMsg').className='msg think';

  const others=shuffle(READING_WORDS[grade].filter(w=>w[1]!==reading)).slice(0,3).map(w=>w[1]);
  const opts=shuffle([reading,...others]);
  const box=$('rAns');box.replaceChildren();
  opts.forEach(opt=>{
    const b=document.createElement('button');
    b.className='ansbtn';b.textContent=opt;
    b.onclick=()=>answerRead(b,opt,reading);
    box.appendChild(b);
  });
}
function answerRead(btn,chosen,correct){
  if(rLocked)return;rLocked=true;
  document.querySelectorAll('#rAns .ansbtn').forEach(b=>b.disabled=true);
  if(chosen===correct){
    btn.classList.add('correct');
    gainStars(1);markDot(rIdx,3);
    $('rMsg').textContent='せいかい! よくできました!';$('rMsg').className='msg good';
    sRight();confetti(20);
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('#rAns .ansbtn').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
    markDot(rIdx,1);
    $('rMsg').textContent=`おしい! ただしくは「${correct}」だよ`;$('rMsg').className='msg oops';
    sOops();
  }
  rIdx++;
  setTimeout(nextRead,1100);
}

/* ================= かんじさがし ================= */
const PUZZLES=5, ROWS=6, COLS=6;
const FOUND_COLORS=['#FFB49B','#8FC5F5','#9CE3C9','#CBB9F2','#E3A93D'];
let grid=[], placed=[], sPnum=0, sMisses=0, dragStart=null, dragEnd=null;
const KANJI_FILL=[...GRADE1_CHARS,...GRADE2_CHARS];

function buildGrid(words){
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  placed=[];
  const target=shuffle(words).slice(0,5);
  for(const word of target) tryPlace(word);
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      if(!grid[r][c])grid[r][c]=KANJI_FILL[Math.floor(Math.random()*KANJI_FILL.length)];
  return grid;
}
function tryPlace(word){
  const dirs=shuffle(['h','v']);
  for(const dir of dirs){
    const maxR=dir==='h'?ROWS-1:ROWS-word.length;
    const maxC=dir==='h'?COLS-word.length:COLS-1;
    if(maxR<0||maxC<0)continue;
    const positions=[];
    for(let r=0;r<=maxR;r++)for(let c=0;c<=maxC;c++)positions.push([r,c]);
    for(const [r,c] of shuffle(positions)){
      let ok=true;
      for(let i=0;i<word.length;i++){
        const gr=dir==='h'?r:r+i, gc=dir==='h'?c+i:c;
        if(grid[gr][gc]!==null&&grid[gr][gc]!==word[i]){ok=false;break;}
      }
      if(ok){
        for(let i=0;i<word.length;i++){
          const gr=dir==='h'?r:r+i, gc=dir==='h'?c+i:c;
          grid[gr][gc]=word[i];
        }
        const r2=dir==='h'?r:r+word.length-1;
        const c2=dir==='h'?c+word.length-1:c;
        placed.push({word,r1:r,c1:c,r2,c2,dir,colorIdx:placed.length,found:false});
        return;
      }
    }
  }
}
function startSearch(){sPnum=0;sessionStars=0;buildDots(PUZZLES);$('reward').style.display='none';nextPuzzle();}
function nextPuzzle(){
  sPnum++;
  $('pcount').textContent=`パズル ${sPnum}/${PUZZLES}`;
  setNowDot(sPnum-1);
  showPuzzle();
}
function showPuzzle(){
  sMisses=0;updateMiss();
  buildGrid(WORD_SETS[grade]);
  renderGridCells();
  renderWordList();
  $('sMsg').textContent='じゅくごを さがして ドラッグしてね!';
  $('sMsg').className='msg think';
  $('nextBtn').style.display='none';
}
function renderGridCells(){
  const gEl=$('wordGrid');gEl.replaceChildren();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cell=document.createElement('div');
      cell.className='wc';
      cell.textContent=grid[r][c];
      cell.dataset.r=r;cell.dataset.c=c;
      gEl.appendChild(cell);
    }
  }
}
function renderWordList(){
  const el=$('wordList');el.replaceChildren();
  placed.forEach((p,i)=>{
    const tag=document.createElement('div');
    tag.className='wtag'+(p.found?' found':'');
    tag.id='wtag'+i;
    if(p.found)tag.style.background=FOUND_COLORS[p.colorIdx%FOUND_COLORS.length];
    tag.textContent=p.word;
    el.appendChild(tag);
  });
}
function updateMiss(){$('missCount').textContent=sMisses>0?`まちがい: ${sMisses}かい`:'';}
function cellFromEvent(e){
  const el=document.elementFromPoint(e.clientX,e.clientY);
  if(!el||!el.classList.contains('wc'))return null;
  return{r:+el.dataset.r,c:+el.dataset.c};
}
function cellsInRange(s,e){
  if(!s||!e)return[];
  if(s.r===e.r){
    const minC=Math.min(s.c,e.c),maxC=Math.max(s.c,e.c);
    return Array.from({length:maxC-minC+1},(_,i)=>({r:s.r,c:minC+i}));
  }
  if(s.c===e.c){
    const minR=Math.min(s.r,e.r),maxR=Math.max(s.r,e.r);
    return Array.from({length:maxR-minR+1},(_,i)=>({r:minR+i,c:s.c}));
  }
  return[];
}
function updateSelecting(){
  document.querySelectorAll('.wc.selecting').forEach(el=>el.classList.remove('selecting'));
  if(!dragStart||!dragEnd)return;
  const cells=cellsInRange(dragStart,dragEnd);
  cells.forEach(({r,c})=>{
    const el=document.querySelector(`#wordGrid .wc[data-r="${r}"][data-c="${c}"]`);
    if(el&&!el.classList.contains('f0')&&!el.classList.contains('f1')&&!el.classList.contains('f2')&&!el.classList.contains('f3')&&!el.classList.contains('f4'))
      el.classList.add('selecting');
  });
}
function checkSelection(s,e){
  if(!s||!e)return;
  const minR=Math.min(s.r,e.r),maxR=Math.max(s.r,e.r);
  const minC=Math.min(s.c,e.c),maxC=Math.max(s.c,e.c);
  if(s.r!==e.r&&s.c!==e.c){return;}
  if(s.r===e.r&&s.c===e.c){return;}

  const match=placed.find(p=>!p.found&&p.r1===minR&&p.c1===minC&&p.r2===maxR&&p.c2===maxC);
  if(match){
    match.found=true;
    const cls='f'+(match.colorIdx%5);
    cellsInRange({r:match.r1,c:match.c1},{r:match.r2,c:match.c2}).forEach(({r,c})=>{
      const el=document.querySelector(`#wordGrid .wc[data-r="${r}"][data-c="${c}"]`);
      if(el){el.classList.remove('selecting');el.classList.add(cls);}
    });
    const tag=$('wtag'+placed.indexOf(match));
    if(tag){tag.classList.add('found');tag.style.background=FOUND_COLORS[match.colorIdx%FOUND_COLORS.length];}
    sFound();
    const remaining=placed.filter(p=>!p.found).length;
    if(remaining===0){
      const gain=sMisses===0?3:sMisses<=2?2:1;
      gainStars(gain);markDot(sPnum-1,gain);
      $('sMsg').textContent=sMisses===0?'パーフェクト! ぜんぶ みつけた!⭐⭐⭐':'ぜんぶ みつけた! ⭐';
      $('sMsg').className='msg good';
      confetti(sMisses===0?50:28);
      $('nextBtn').textContent=sPnum>=PUZZLES?'🎉 けっかを みる!':'つぎの パズル ➡';
      $('nextBtn').style.display='';
    }else{
      $('sMsg').textContent=`「${match.word}」みつけた! あと${remaining}こ!`;
      $('sMsg').className='msg good';
    }
  }else{
    sMisses++;updateMiss();
    sOops();
    const cells=cellsInRange(s,e);
    cells.forEach(({r,c})=>{
      const el=document.querySelector(`#wordGrid .wc[data-r="${r}"][data-c="${c}"]`);
      if(el){el.classList.remove('selecting');el.classList.add('wrong');
        setTimeout(()=>el.classList.remove('wrong'),420);}
    });
  }
}
const gridEl=$('wordGrid');
gridEl.addEventListener('pointerdown',e=>{
  const cell=cellFromEvent(e);
  if(!cell)return;
  gridEl.setPointerCapture(e.pointerId);
  dragStart=cell;dragEnd=cell;
  e.preventDefault();updateSelecting();
});
gridEl.addEventListener('pointermove',e=>{
  if(!dragStart)return;
  const cell=cellFromEvent(e);
  if(!cell)return;
  if(cell.r===dragStart.r||cell.c===dragStart.c){dragEnd=cell;updateSelecting();}
});
gridEl.addEventListener('pointerup',e=>{
  if(!dragStart)return;
  checkSelection(dragStart,dragEnd);
  dragStart=null;dragEnd=null;updateSelecting();
});
$('nextBtn').onclick=()=>{if(sPnum>=PUZZLES)showReward('かんじさがし クリア!','ぜんぶの じゅくごを みつけた! すごい!');else nextPuzzle();};
$('soundBtn').onclick=()=>{
  muted=!muted;$('soundBtn').textContent=muted?'🔇':'🔊';
  $('soundBtn').classList.toggle('on',muted);
};

/* ================= なぞりがき ================= */
const TRACE_LEN=6;
let hw=null, tQueue=[], tIdx=0, tMistakes=0, tBusy=false;

function ensureWriter(){
  if(hw)return;
  hw=HanziWriter.create('hwTarget','一',{
    width:Math.min(window.innerWidth*0.7,260),
    height:Math.min(window.innerWidth*0.7,260),
    padding:12,
    strokeColor:'#3E5578',
    outlineColor:'#D7E3F2',
    highlightColor:'#FFDE8E',
    showOutline:true,
    showCharacter:false,
  });
}
function startTrace(){
  ensureWriter();
  const pool=shuffle(grade===1?GRADE1_CHARS:GRADE2_CHARS);
  tQueue=pool.slice(0,TRACE_LEN);
  tIdx=0;sessionStars=0;
  buildDots(TRACE_LEN);
  $('reward').style.display='none';
  nextTrace();
}
function quizOpts(){
  return{
    showHintAfterMisses:2,
    highlightOnComplete:true,
    acceptBackwardsStrokes:true,
    leniency:1.3,
    onMistake:()=>{tMistakes++;sOops();},
    onComplete:()=>{
      const gain=tMistakes===0?3:tMistakes<=3?2:1;
      gainStars(gain);markDot(tIdx,gain);
      $('tMsg').textContent=tMistakes===0?'かんぺき! きれいに かけたね!⭐⭐⭐':'かけたね! ⭐';
      $('tMsg').className='msg good';
      sRight();confetti(tMistakes===0?50:28);
      tIdx++;
      setTimeout(()=>{ tBusy=false; nextTrace(); },1300);
    },
  };
}
function nextTrace(){
  if(tBusy)return;
  if(tIdx>=tQueue.length){showReward('なぞりがき クリア!','ぜんぶ きれいに かけたね! さすが!');return;}
  $('pcount').textContent=`${tIdx+1}/${TRACE_LEN}`;
  setNowDot(tIdx);
  tMistakes=0;
  const char=tQueue[tIdx];
  $('tMsg').textContent='ゆびで なぞって かいてみよう!';
  $('tMsg').className='msg think';
  ensureWriter();
  hw.setCharacter(char);
  hw.quiz(quizOpts());
}
$('demoBtn').onclick=()=>{
  if(!hw||tBusy)return;
  tBusy=true;
  hw.cancelQuiz();
  hw.showOutline();
  hw.hideCharacter();
  hw.animateCharacter({
    onComplete:()=>{
      setTimeout(()=>{ tBusy=false; hw.quiz(quizOpts()); },300);
    }
  });
};
$('skipBtn').onclick=()=>{
  if(tBusy)return;
  if(!hw)return;
  hw.cancelQuiz();
  markDot(tIdx,0);
  tIdx++;
  nextTrace();
};

/* ================= grade / mode switching ================= */
function startMode(){
  if(mode==='read')startRead();
  else if(mode==='search')startSearch();
  else if(mode==='trace')startTrace();
}
document.querySelectorAll('#grades .lv').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#grades .lv').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');grade=+b.dataset.g;startMode();
});
document.querySelectorAll('#modes .tab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#modes .tab').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');mode=b.dataset.m;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  $('view'+mode[0].toUpperCase()+mode.slice(1)).classList.add('on');
  $('missCount').textContent='';
  startMode();
});

$('againBtn').onclick=startMode;
$('starsPill').onclick=()=>{renderZukan();$('zukan').style.display='flex';};
$('zClose').onclick=()=>$('zukan').style.display='none';
$('zukan').onclick=e=>{if(e.target.id==='zukan')$('zukan').style.display='none';};
$('uClose').onclick=()=>$('unlock').style.display='none';

loadStars().finally(startMode);
})();
</script>
